<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8">

    <title>Calculator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1">
    <meta name="description" content="Calculator project from The Odin Project's Foundations course.">
    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/app.js" defer></script>

</head>
<body>
    <main class="container">
        <div class="calculator-container">
            <div class="calculator-display-container">
                <output class="keypad-input">(+ - * /)</output>
                <output class="keypad-result">Enter an equation...</output>
            </div>
            <ul class="calculator-keypad-container">
                <!-- JavaScript will dynamically generate keypad buttons. -->
            </ul>
        </div>
        <div class="github-repo-link">
            A project from <a href="https://github.com/nitrocodebrew" target="_blank" rel="noopener noreferrer" title="John's GitHub profile">John Smicklo</a>.
        </div>
    </main>
</body>
</html>
